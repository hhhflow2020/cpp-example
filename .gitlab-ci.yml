stages:
  - build
  - test
  - package

variables:
  BUILD_TYPE: "Release"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE"
  DOCKER_TLS_CERTDIR: ""

cache:
  key:
    files:
      - conanfile.py
      - conanfile.txt
  paths:
    - .conan2/

build:
  stage: build
  image: registry.example.com/cpp/build:latest

  before_script:
    - export CONAN_HOME="$CI_PROJECT_DIR/.conan2"
    - conan profile detect --force

  script:
    - conan install . --output-folder=build --build=missing -s build_type=${BUILD_TYPE}
    - cmake -S . -B build -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake
    - cmake --build build --config ${BUILD_TYPE} -j$(nproc)

  artifacts:
    expire_in: 1 week
    paths:
      - build/

test:
  stage: test
  image: registry.example.com/cpp/build:latest

  dependencies:
    - build

  script:
    - ctest --test-dir build --output-on-failure

package:
  stage: package
  image: docker:27
  services:
    - docker:27-dind

  dependencies:
    - build

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "develop"'

  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin

  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        IMAGE_TAG="$CI_COMMIT_TAG"
      elif [ "$CI_COMMIT_BRANCH" = "main" ]; then
        IMAGE_TAG="latest"
      else
        IMAGE_TAG="${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
      fi

      echo "IMAGE_TAG=$IMAGE_TAG"

      docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" .
      docker push "${IMAGE_NAME}:${IMAGE_TAG}"