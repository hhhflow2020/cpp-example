name: C++ Build & Multi-Arch Release

on:
  pull_request:
    branches: [main]

  push:
    branches: [develop, main]
    tags:
      - "v*"

env:
  APP_NAME: matrix_app
  BUILD_IMAGE: ghcr.io/hhhflow2020/cpp-builder-gcc:bookworm-v1.0.5
  RUNTIME_IMAGE_RELEASE: ghcr.io/hhhflow2020/cpp-runtime-base:bookworm-v1.0.5
  RUNTIME_IMAGE_DEBUG: ghcr.io/hhhflow2020/cpp-runtime-debug-base:bookworm-v1.0.5

jobs:
  build-test:
    name: Build & Test ${{ matrix.build_type }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    container:
      image: registry.example.com/cpp/build:stable
      # 如果 registry.example.com 是私有仓库，保留 credentials
      # 如果是公开仓库，可以删除 credentials
      # credentials:
      #   username: ${{ secrets.BUILD_REGISTRY_USERNAME }}
      #   password: ${{ secrets.BUILD_REGISTRY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Conan
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ matrix.build_type }}-${{ hashFiles('conanfile.*', 'conan.lock') }}
          restore-keys: |
            conan-${{ runner.os }}-${{ matrix.build_type }}-
            conan-${{ runner.os }}-

      - name: Install Conan dependencies
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          chmod +x scripts/conan-install.sh
          ./scripts/conan-install.sh

      - name: Build and test
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
          INSTALL_PREFIX: /tmp/package-${{ matrix.build_type }}
        run: |
          chmod +x scripts/cmake-build.sh
          ./scripts/cmake-build.sh

  docker:
    name: Docker ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          echo "GHCR_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "DOCKERHUB_IMAGE=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${REPO_NAME,,}" >> "$GITHUB_ENV"

      - name: Login to private registry
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          flavor: |
            latest=${{ matrix.build_type == 'Release' && 'auto' || 'false' }}
            suffix=${{ matrix.build_type == 'Debug' && '-debug' || '' }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.runtime
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_TYPE=${{ matrix.build_type }}
            BUILD_IMAGE=${{ env.BUILD_IMAGE }}
            RUNTIME_IMAGE=${{ matrix.build_type == 'Debug' && env.RUNTIME_IMAGE_DEBUG || env.RUNTIME_IMAGE_RELEASE }}
          cache-from: type=gha,scope=docker-${{ matrix.build_type }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.build_type }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}